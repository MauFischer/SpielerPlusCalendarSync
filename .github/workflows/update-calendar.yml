name: Update SpielerPlus Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  build-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ICS file
        env:
          SPIELERPLUS_USERNAME: ${{ secrets.SPIELERPLUS_USERNAME }}
          SPIELERPLUS_PASSWORD: ${{ secrets.SPIELERPLUS_PASSWORD }}
          CALENDAR_FILENAME: ${{ secrets.CALENDAR_FILENAME }}
          SPIELERPLUS_TEAM_ID: ${{ secrets.SPIELERPLUS_TEAM_ID }}
          SPIELERPLUS_MEMBER_IDS: ${{ secrets.SPIELERPLUS_MEMBER_IDS }}
          CALENDAR_NAME: ${{ vars.CALENDAR_NAME }}
          TIMEZONE: ${{ vars.TIMEZONE }}
        run: |
          python generate_ics.py

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git commit -m "Update calendar" || echo "No changes to commit"
          git push
